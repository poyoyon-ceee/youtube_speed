<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youtube_speed</title>
    <!-- Google Fonts (オンライン) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <h1>YouTube Speed</h1>
        <div class="status-card">
            <p>現在の設定はYouTubeプレイヤーに直接反映されます。</p>
            <div class="speed-indicator">
                <span id="current-speed-display">1.0</span>x
            </div>
        </div>
        
        <div class="info-section">
            <h3>ショートカット</h3>
            <ul>
                <li>[ 1.0 ] - 標準速度</li>
                <li>[ 1.25 ] - 1.25倍速</li>
                <li>[ 1.5 ] - 1.5倍速</li>
                <li>[ 2.0 ] - 2倍速</li>
                <li>[ 3.0 ] - 3倍速</li>
            </ul>
        </div>
    </div>

    <!-- スクリプト -->
    <script type="module" src="src/core/event-bus.js"></script>
    <script type="module" src="src/core/state-manager.js"></script>
    <script type="module" src="src/utils/sanitizer.js"></script>
    <script type="module" src="src/utils/migration.js"></script>
    <script type="module" src="src/utils/config.js"></script>
    <script type="module" src="src/utils/diff.js"></script>
    
    <script>
        // アプリケーション初期化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ アプリケーション起動');
            
            // EventBusが利用可能な場合
            if (window.EventBus) {
                console.log('✅ EventBus 利用可能');
            }
            
            // StateManagerが利用可能な場合
            if (window.StateManager) {
                console.log('✅ StateManager 利用可能');
            }
        });
    </script>
</body>
</html>
